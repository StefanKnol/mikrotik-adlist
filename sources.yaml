# Source configuration for build_adlist.py
#
# Each entry under "outputs:" produces one merged hosts file. Pick the tier
# that fits your router's RAM. Rough RAM cost in RouterOS 7 DNS cache is
# ~100-150 bytes per entry (plus the DNS cache size itself).
#
#   ~50 k    entries   = small      (hAP ac, hEX with 256 MB RAM is fine)
#   ~150 k   entries   = medium     (sweet spot for most routers)
#   ~500 k   entries   = large      (only for routers with 512 MB+ RAM)
#  ~1.2 M   entries   = full       (CCR / RB5009 / 1 GB+ RAM)
#  ~1.8 M   entries   = everything  (research / curiosity tier)
#
# After editing this file the next workflow run rebuilds and commits.
# The MikroTik Adlist URL keeps the same path, so no router-side changes.
#
# Branch note: IgorKha's repo default branch is "main", not "master".
#
# Lists deliberately EXCLUDED from the small/medium/large/full tiers (the
# "everything" tier still includes them):
#   - no_google.txt           : breaks Google search, Gmail, Maps, etc.
#   - hagezi_antipiracy_blocklist.txt
#   - hagezi_gambling_blocklist.txt
#   - hagezi_encrypted_dns_vpn_tor_proxy_bypass.txt
#   - country-prefixed lists (CHN/HUN/KOR/POL/etc.)
#
# If a future source ever creeps in and blocks something you need, the safest
# fix is to add the domain to allowlist.txt - it will be removed on the next
# build, including all sub-domains.

outputs:

  # ----- SMALL TIER (~40-80k entries) -----------------------------------
  adlist-small.txt:
    description: "Small balanced list - low memory, low false positives"
    output: adlist-small.txt
    sources:
      - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
      - https://raw.githubusercontent.com/IgorKha/mikrotik-adlist/main/hosts/oisd_basic.txt

  # ----- MEDIUM TIER (~150-250k entries) ---------------------------------
